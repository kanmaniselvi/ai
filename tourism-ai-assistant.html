<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourism AI Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #2c3e50; }
        .suggestions { margin-top: 20px; }
        .suggestion { border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Tourism AI Assistant</h1>
    <div>
        <input type="text" id="location" placeholder="Enter your location" />
        <button id="search">Search</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
    <script>
        document.getElementById('search').addEventListener('click', function() {
            const location = document.getElementById('location').value;
            fetch(`https://api.gemini.com/tourism?location=${location}`) // Placeholder for actual API URL
                .then(response => response.json())
                .then(data => {
                    const suggestionsDiv = document.getElementById('suggestions');
                    suggestionsDiv.innerHTML = '';
                    if(data.places.length > 0) {
                        data.places.forEach(place => {
                            const div = document.createElement('div');
                            div.classList.add('suggestion');
                            div.innerHTML = `<h3>${place.name}</h3><p>${place.description}</p>`;
                            suggestionsDiv.appendChild(div);
                        });
                    } else {
                        suggestionsDiv.innerHTML = 'No places found.';
                    }
                })
                .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
