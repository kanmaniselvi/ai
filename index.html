<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Travel Planner</title>
</head>
<body>
    <header>
        <h1>Welcome to the Smart Travel Planner</h1>
    </header>
    <main>
        <form action="/submit" method="post">
            <label for="destination">Destination:</label>
            <input type="text" id="destination" name="destination" required>
            <br>
            <label for="departure">Departure Date:</label>
            <input type="date" id="departure" name="departure" required>
            <br>
            <label for="return">Return Date:</label>
            <input type="date" id="return" name="return" required>
            <br>
            <label for="traveler">Number of Travelers:</label>
            <input type="number" id="traveler" name="traveler" min="1" required>
            <br>
            <input type="submit" value="Plan Travel">
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Smart Travel Planner</p>
    </footer>
</body>
</html>
